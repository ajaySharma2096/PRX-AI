<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>PRX — AI Workflow Features</title>
    <meta name="description" content="Drop one file into any repository. Copilot analyzes your codebase, generates a project-specific rulebook, and installs a gate-controlled 3-phase delivery workflow — automatically." />
    <meta name="theme-color" content="#030712" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="PRX — AI-Controlled Software Delivery" />
    <meta property="og:description" content="One file. Any repository. Gate-controlled 3-phase AI workflow." />
    <meta property="og:image"       content="/og-image.png" />

    <!--
      Font stack: Segoe UI (system) for UI, Courier New for code — no external font load
    -->

    <!-- Favicon (replace with your own asset) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <!--
      React mounts here.
      The #root div has no inline styles — all visual styling
      is handled by Tailwind + globals.css.
    -->
    <div id="root"></div>

    <!-- Entry point — Vite resolves the JSX transform -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
